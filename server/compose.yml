services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    working_dir: /app
    command: sh -c "corepack enable && yarn install && yarn dev"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: postgres
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

volumes:
  pg_data:

networks:
  app_net:
    driver: bridge
