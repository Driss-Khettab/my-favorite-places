services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_net

  server:
    image: ghcr.io/driss-khettab/my-favorite-places-server:latest
    container_name: my-favorite-places-server
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: postgres
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net

  client:
    image: ghcr.io/driss-khettab/my-favorite-places-client:latest
    container_name: my-favorite-places-client
    depends_on:
      - server
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - app_net

volumes:
  pg_data:

networks:
  app_net:
    driver: bridge
